<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HELIX — Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <!-- Particle Canvas -->
    <canvas id="helix-canvas"></canvas>

    <!-- Auth Page -->
    <div class="auth-page">
      <div class="auth-container" data-aos="fade-up">
        <div class="auth-card">
          <div class="auth-card-glow"></div>

          <!-- Header -->
          <div class="auth-header">
            <a href="/" class="auth-logo">
              <span class="logo-bracket">[</span>
              <span class="logo-text">HELIX</span>
              <span class="logo-bracket">]</span>
            </a>
            <h1 class="auth-title">Access Command Center</h1>
            <p class="auth-subtitle">
              Enter your credentials to continue to the platform.
            </p>
          </div>

          <!-- Login Form -->
          <form class="auth-form" id="loginForm" onsubmit="Auth.handleLogin(event)">
            <div class="form-group">
              <label class="form-label" for="loginUsername">Username</label>
              <input
                type="text"
                class="form-input"
                id="loginUsername"
                placeholder="operator_callsign"
                autocomplete="username"
                required
              />
              <span class="form-error" id="usernameError"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="loginPassword">Password</label>
              <input
                type="password"
                class="form-input"
                id="loginPassword"
                placeholder="••••••••••••"
                autocomplete="current-password"
                required
              />
              <span class="form-error" id="passwordError"></span>
            </div>

            <div class="form-checkbox">
              <input type="checkbox" id="rememberMe" />
              <label for="rememberMe">Remember this device</label>
            </div>

            <button type="submit" class="auth-btn auth-btn-primary" id="loginBtn">
              <span class="btn-text">
                <i class="bi bi-terminal me-2"></i>Authenticate
              </span>
              <div class="btn-loader"></div>
            </button>
          </form>

          <!-- Footer -->
          <div class="auth-footer">
            <div class="auth-divider">
              <span>New Operator</span>
            </div>
            <p>
              Don't have an account?
              <a href="register.html">Create one</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/script.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
