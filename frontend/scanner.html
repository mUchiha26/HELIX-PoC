<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HELIX — Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/components.css" />
    <style>
      .scan-form { background: var(--bg-panel); border: 1px solid var(--border-subtle); border-radius: var(--panel-radius); padding: 1.5rem; }
      .scan-form .form-label { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
      .scan-form .form-input { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 0.7rem 0.85rem; color: var(--text-primary); font-family: var(--font-body); font-size: 0.95rem; width: 100%; }
      .scan-form .form-input:focus { outline: none; border-color: var(--blue-accent); }
      .scan-form .form-select { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 0.7rem 0.85rem; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.85rem; width: 100%; }
      .scan-btn { background: linear-gradient(135deg, var(--red-team), var(--red-dim)); color: white; border: none; border-radius: 6px; padding: 0.75rem 1.5rem; font-family: var(--font-mono); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all var(--transition-mid); }
      .scan-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(224, 45, 60, 0.4); }
      .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
      .scan-progress { margin-top: 1rem; }
      .port-open { color: #22c55e; }
      .port-closed { color: var(--text-muted); }
      .port-filtered { color: var(--ai-gold); }
    </style>
  </head>
  <body>
    <canvas id="helix-canvas"></canvas>
    <div class="dashboard-layout">
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><a href="/dashboard.html" class="sidebar-logo"><span class="logo-bracket">[</span><span class="logo-text">HELIX</span><span class="logo-bracket">]</span></a></div>
        <div class="sidebar-user" id="sidebarUser" style="display:none;"><div class="user-avatar" id="sidebarAvatar"></div><div class="user-info"><div class="user-name" id="sidebarUserName"></div><span class="role-indicator" id="sidebarRole"></span></div></div>
        <nav class="sidebar-nav">
          <div class="nav-section"><div class="nav-section-title">Main</div><a href="/dashboard.html" class="nav-link" data-page="dashboard"><i class="bi bi-grid-3x3-gap-fill"></i> Dashboard</a><a href="/alerts.html" class="nav-link" data-page="alerts"><i class="bi bi-bell-fill"></i> Alerts <span class="nav-badge">3</span></a><a href="/logs.html" class="nav-link" data-page="logs"><i class="bi bi-journal-code"></i> Logs</a></div>
          <div class="nav-section"><div class="nav-section-title">Intelligence</div><a href="/ai-assistant.html" class="nav-link" data-page="ai"><i class="bi bi-robot"></i> AI Assistant</a><a href="/scanner.html" class="nav-link" data-page="scanner"><i class="bi bi-crosshair"></i> Scanner</a><a href="/fim.html" class="nav-link" data-page="fim"><i class="bi bi-shield-check"></i> Integrity Monitor</a></div>
          <div class="nav-section"><div class="nav-section-title">Administration</div><a href="/admin.html" class="nav-link" data-page="admin"><i class="bi bi-shield-lock-fill"></i> Admin</a></div>
          <div class="nav-section"><div class="nav-section-title">Learning</div><a href="/learner.html" class="nav-link" data-page="learner"><i class="bi bi-mortarboard-fill"></i> Learner Hub</a></div>
        </nav>
        <div class="sidebar-footer"><a href="/profile.html" class="nav-link" data-page="profile"><i class="bi bi-person-gear"></i> Profile</a><a href="#" class="nav-link" onclick="Auth.handleLogout()"><i class="bi bi-box-arrow-left"></i> Logout</a></div>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button><div><div class="topbar-title">Port Scanner</div><div class="topbar-breadcrumb">HELIX / <span>Red Team Ops</span></div></div></div>
          <div class="topbar-right"><button class="topbar-btn" id="themeToggle"><i class="bi bi-moon-stars-fill" id="themeIcon"></i></button><button class="topbar-btn"><i class="bi bi-bell"></i><span class="notif-dot"></span></button></div>
        </header>
        <div class="page-content">
          <div class="row g-4">
            <!-- Scan Form -->
            <div class="col-lg-4">
              <div class="scan-form">
                <h3 class="font-heading mb-3" style="font-family: var(--font-heading); font-size: 1rem; color: var(--text-primary);">
                  <i class="bi bi-crosshair me-2" style="color: var(--red-team);"></i>New Scan
                </h3>
                <form id="scanForm" onsubmit="handleScan(event)">
                  <div class="mb-3">
                    <label class="form-label">Target</label>
                    <input type="text" class="form-input" id="scanTarget" placeholder="192.168.1.1 or example.com" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Port Range</label>
                    <input type="text" class="form-input" id="scanPort" placeholder="1-1024 or 80,443,8080" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Protocol</label>
                    <select class="form-select" id="scanProtocol">
                      <option value="TCP">TCP</option>
                      <option value="UDP">UDP</option>
                    </select>
                  </div>
                  <button type="submit" class="scan-btn w-100" id="scanBtn">
                    <i class="bi bi-lightning-charge me-2"></i>Initiate Scan
                  </button>
                </form>
                <div id="scanProgress"></div>
              </div>
            </div>

            <!-- Scan Results -->
            <div class="col-lg-8">
              <div class="helix-table-wrap">
                <table class="helix-table">
                  <thead><tr><th>Target</th><th>Port</th><th>Protocol</th><th>Status</th><th>Scanned At</th></tr></thead>
                  <tbody id="scanResultsBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <div class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/script.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/scanner.js"></script>
  </body>
</html>
