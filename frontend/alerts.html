<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HELIX — Alerts</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <canvas id="helix-canvas"></canvas>

    <div class="dashboard-layout">
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Sidebar (same structure as dashboard.html) -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <a href="/dashboard.html" class="sidebar-logo">
            <span class="logo-bracket">[</span><span class="logo-text">HELIX</span><span class="logo-bracket">]</span>
          </a>
        </div>
        <div class="sidebar-user" id="sidebarUser" style="display:none;">
          <div class="user-avatar" id="sidebarAvatar"></div>
          <div class="user-info">
            <div class="user-name" id="sidebarUserName"></div>
            <span class="role-indicator" id="sidebarRole"></span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <a href="/dashboard.html" class="nav-link" data-page="dashboard"><i class="bi bi-grid-3x3-gap-fill"></i> Dashboard</a>
            <a href="/alerts.html" class="nav-link" data-page="alerts"><i class="bi bi-bell-fill"></i> Alerts <span class="nav-badge">3</span></a>
            <a href="/logs.html" class="nav-link" data-page="logs"><i class="bi bi-journal-code"></i> Logs</a>
          </div>
          <div class="nav-section">
            <div class="nav-section-title">Intelligence</div>
            <a href="/ai-assistant.html" class="nav-link" data-page="ai"><i class="bi bi-robot"></i> AI Assistant</a>
            <a href="/scanner.html" class="nav-link" data-page="scanner"><i class="bi bi-crosshair"></i> Scanner</a>
          </div>
          <div class="nav-section">
            <div class="nav-section-title">Administration</div>
            <a href="/admin.html" class="nav-link" data-page="admin"><i class="bi bi-shield-lock-fill"></i> Admin</a>
          </div>
          <div class="nav-section">
            <div class="nav-section-title">Learning</div>
            <a href="/learner.html" class="nav-link" data-page="learner"><i class="bi bi-mortarboard-fill"></i> Learner Hub</a>
          </div>
        </nav>
        <div class="sidebar-footer">
          <a href="/profile.html" class="nav-link" data-page="profile"><i class="bi bi-person-gear"></i> Profile</a>
          <a href="#" class="nav-link" onclick="Auth.handleLogout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div>
              <div class="topbar-title">Alerts</div>
              <div class="topbar-breadcrumb">HELIX / <span>Alert Management</span></div>
            </div>
          </div>
          <div class="topbar-right">
            <button class="topbar-btn" id="themeToggle"><i class="bi bi-moon-stars-fill" id="themeIcon"></i></button>
            <button class="topbar-btn"><i class="bi bi-bell"></i><span class="notif-dot"></span></button>
          </div>
        </header>

        <div class="page-content">
          <!-- Filter Bar -->
          <div class="filter-bar">
            <input type="text" class="filter-input" placeholder="Search alerts..." id="alertSearch" style="flex: 1; max-width: 300px;" />
            <select class="filter-select" id="severityFilter">
              <option value="">All Severities</option>
              <option value="critical">Critical</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <select class="filter-select" id="statusFilter">
              <option value="">All Statuses</option>
              <option value="open">Open</option>
              <option value="investigating">Investigating</option>
              <option value="resolved">Resolved</option>
            </select>
          </div>

          <!-- Alerts Table -->
          <div class="helix-table-wrap">
            <table class="helix-table" id="alertsTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Title</th>
                  <th>Severity</th>
                  <th>Status</th>
                  <th>Assigned To</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="alertsBody">
                <!-- Rows injected by JS -->
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="helix-pagination" id="alertsPagination"></div>
        </div>
      </main>
    </div>

    <!-- Alert Detail Modal -->
    <div class="helix-modal-overlay" id="alertModal">
      <div class="helix-modal">
        <div class="helix-modal-header">
          <h3 id="alertModalTitle">Alert Details</h3>
          <button class="helix-modal-close" onclick="hideModal('alertModal')"><i class="bi bi-x"></i></button>
        </div>
        <div class="helix-modal-body" id="alertModalBody">
          <!-- Detail content injected by JS -->
        </div>
        <div class="helix-modal-footer">
          <button class="btn helix-btn-ghost" onclick="hideModal('alertModal')">Close</button>
          <button class="btn helix-btn-primary" id="alertResolveBtn">
            <i class="bi bi-check-lg me-1"></i> Resolve
          </button>
        </div>
      </div>
    </div>

    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/script.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/alerts.js"></script>
  </body>
</html>
